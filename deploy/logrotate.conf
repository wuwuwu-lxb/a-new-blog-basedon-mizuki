# Mizuki 博客日志轮转配置
# 复制到 /etc/logrotate.d/mizuki

/var/log/nginx/mizuki-*.log {
    daily
    rotate 14
    compress
    delaycompress
    notifempty
    create 0640 www-data adm
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 $(cat /var/run/nginx.pid)
    endscript
}

/var/log/mizuki/*.log {
    daily
    rotate 14
    compress
    delaycompress
    notifempty
    missingok
    create 0640 nodejs nodejs
    postrotate
        # 如果使用 PM2，重新加载日志
        /usr/bin/pkill -f mizuki || true
    endscript
}
