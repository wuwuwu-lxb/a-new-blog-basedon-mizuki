version: '3.8'

services:
  # Mizuki 博客主服务
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mizuki-blog
    restart: unless-stopped
    ports:
      - "3000:3000"

    # 环境变量
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=file:/app/data/dev.db
      - JWT_SECRET=${JWT_SECRET:-mizuki-dev-jwt-secret-key-2026-abc123xyz}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CHAT_MODEL=${CHAT_MODEL:-qwen-plus}
      - CHAT_API_URL=${CHAT_API_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-v2}
      - EMBEDDING_API_URL=${EMBEDDING_API_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1/embeddings}

    # 数据持久化
    volumes:
      # 数据库文件
      - mizuki-db:/app/data
      # 上传文件
      - mizuki-uploads:/app/public/uploads
      # 日志文件
      - mizuki-logs:/app/logs

    # 网络配置
    networks:
      - mizuki-network

    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

    # 健康检查
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx 反向代理（可选：如果需要 HTTPS 和静态文件缓存）
  # nginx:
  #   image: nginx:alpine
  #   container_name: mizuki-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
  #     - ./dist/client:/usr/share/nginx/html:ro
  #   networks:
  #     - mizuki-network
  #   depends_on:
  #     - web
  #   profiles:
  #     - with-nginx

# 数据卷
volumes:
  mizuki-db:
    driver: local
    name: mizuki-db
  mizuki-uploads:
    driver: local
    name: mizuki-uploads
  mizuki-logs:
    driver: local
    name: mizuki-logs

# 网络
networks:
  mizuki-network:
    driver: bridge
    name: mizuki-network
